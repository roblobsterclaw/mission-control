<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rob Lobster — Mission Control</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f12;--bg2:#141820;--bg3:#1a1f2a;--bg4:#222838;
  --text:#e8eaed;--text2:#9aa0b0;--text3:#5a6070;
  --accent:#FF6B35;--accent2:#ff8f65;
  --tlc:#4CAF50;--surfbox:#2196F3;--investing:#9C27B0;--rebolt:#FF9800;
  --realestate:#00BCD4;--colorant:#E91E63;--personal:#607D8B;--infra:#FFC107;
  --all:#FF6B35;
  --radius:8px;--radius2:12px;
  --shadow:0 2px 8px rgba(0,0,0,.4);
  --transition:all .25s ease;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
.mono{font-family:'SF Mono','Fira Code','Cascadia Code',Menlo,monospace}

/* Layout */
.app{display:flex;height:100vh;width:100vw}
.sidebar{width:220px;min-width:220px;background:var(--bg2);border-right:1px solid var(--bg4);display:flex;flex-direction:column;z-index:10}
.sidebar-logo{padding:20px 16px 16px;border-bottom:1px solid var(--bg4);text-align:center}
.sidebar-logo h2{font-size:15px;color:var(--accent);font-weight:700;letter-spacing:.5px}
.sidebar-logo .sub{font-size:11px;color:var(--text3);margin-top:2px}
.sidebar-nav{flex:1;padding:12px 8px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius);cursor:pointer;transition:var(--transition);font-size:13px;color:var(--text2);font-weight:500;border:1px solid transparent}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:rgba(255,107,53,.12);color:var(--accent);border-color:rgba(255,107,53,.2)}
.nav-item .icon{font-size:18px;width:24px;text-align:center}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--bg4);font-size:10px;color:var(--text3);text-align:center}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.header{height:52px;min-height:52px;background:var(--bg2);border-bottom:1px solid var(--bg4);display:flex;align-items:center;justify-content:space-between;padding:0 24px}
.header-title{font-size:15px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px}
.header-title .lobster{font-size:20px}
.header-right{display:flex;align-items:center;gap:16px}
.header-time{font-size:12px;color:var(--text2);font-family:'SF Mono',Menlo,monospace}
.content{flex:1;overflow-y:auto;padding:24px;scroll-behavior:smooth}
.content::-webkit-scrollbar{width:6px}
.content::-webkit-scrollbar-track{background:transparent}
.content::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}

/* Screen titles */
.screen-title{font-size:22px;font-weight:700;margin-bottom:4px}
.screen-subtitle{font-size:13px;color:var(--text2);margin-bottom:20px}

/* Cards */
.card{background:var(--bg3);border:1px solid var(--bg4);border-radius:var(--radius2);padding:16px;transition:var(--transition)}
.card:hover{border-color:rgba(255,107,53,.15)}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.card-title{font-size:14px;font-weight:600}

/* Tags / Pills */
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.tag-tlc{background:rgba(76,175,80,.15);color:#4CAF50}
.tag-surfbox{background:rgba(33,150,243,.15);color:#2196F3}
.tag-investing{background:rgba(156,39,176,.15);color:#9C27B0}
.tag-rebolt{background:rgba(255,152,0,.15);color:#FF9800}
.tag-realestate{background:rgba(0,188,212,.15);color:#00BCD4}
.tag-colorant{background:rgba(233,30,99,.15);color:#E91E63}
.tag-personal{background:rgba(96,125,139,.15);color:#607D8B}
.tag-infra{background:rgba(255,193,7,.15);color:#FFC107}
.tag-all{background:rgba(255,107,53,.15);color:#FF6B35}
.tag-pool{background:rgba(0,230,118,.15);color:#00E676}
.tag-lobsterpress{background:rgba(255,64,129,.15);color:#FF4081}

.priority-high{color:#ef5350}.priority-medium{color:#FFC107}.priority-low{color:#66BB6A}

/* Status badges */
.status{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600}
.status-success{color:#66BB6A}.status-running{color:#42A5F5}.status-failed{color:#ef5350}.status-pending{color:#FFC107}
.status::before{content:'';width:6px;height:6px;border-radius:50%;display:inline-block}
.status-success::before{background:#66BB6A}.status-running::before{background:#42A5F5;animation:pulse 1.5s infinite}
.status-failed::before{background:#ef5350}.status-pending::before{background:#FFC107}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Filter bar */
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-pill{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--bg4);background:var(--bg2);color:var(--text2);transition:var(--transition)}
.filter-pill:hover,.filter-pill.active{background:rgba(255,107,53,.12);color:var(--accent);border-color:rgba(255,107,53,.3)}

/* Input */
.search-input{width:100%;padding:10px 16px 10px 40px;background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--radius);color:var(--text);font-size:14px;outline:none;transition:var(--transition)}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,107,53,.1)}
.search-wrap{position:relative;margin-bottom:16px}
.search-wrap::before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px}

/* Activity Feed */
.feed-item{display:grid;grid-template-columns:90px 32px 1fr 100px 80px 80px;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--bg4);transition:var(--transition);font-size:13px}
.feed-item:hover{background:rgba(255,255,255,.02)}
.feed-time{font-family:'SF Mono',Menlo,monospace;font-size:11px;color:var(--text2)}
.feed-icon{font-size:18px;text-align:center}
.feed-desc{color:var(--text)}
.feed-tokens{font-family:'SF Mono',Menlo,monospace;font-size:11px;color:var(--text3);text-align:right}
.feed-header{display:grid;grid-template-columns:90px 32px 1fr 100px 80px 80px;gap:12px;padding:8px 16px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bg4)}

/* Agent Health Panel */
.activity-layout{display:grid;grid-template-columns:1fr 260px;gap:20px;align-items:start}
.health-panel{background:var(--bg3);border:1px solid var(--bg4);border-radius:var(--radius2);padding:16px;position:sticky;top:0}
.health-panel h4{font-size:13px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.agent-health-row{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--bg2);border-radius:var(--radius);margin-bottom:6px;font-size:12px}
.agent-health-row .ah-name{font-weight:600;display:flex;align-items:center;gap:8px}
.ah-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ah-green{background:#66BB6A;box-shadow:0 0 6px rgba(102,187,106,.5);animation:pulse 2s infinite}
.ah-red{background:#ef5350;box-shadow:0 0 6px rgba(239,83,80,.5)}
.ah-grey{background:#5a6070}
.ah-val{font-size:10px;color:var(--text3);font-family:'SF Mono',Menlo,monospace}
.health-divider{height:1px;background:var(--bg4);margin:10px 0}
.health-stat{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:4px}
.health-stat span:last-child{color:var(--accent);font-family:'SF Mono',Menlo,monospace}

/* Calendar */
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--bg4);border-radius:var(--radius2);overflow:hidden;margin-bottom:20px}
.cal-header-cell{background:var(--bg3);padding:8px;text-align:center;font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.cal-cell{background:var(--bg2);min-height:90px;padding:6px;position:relative;cursor:pointer;transition:var(--transition)}
.cal-cell:hover{background:var(--bg3)}
.cal-cell.today{box-shadow:inset 0 0 0 2px var(--accent)}
.cal-cell.other-month{opacity:.3}
.cal-day{font-size:12px;font-weight:600;margin-bottom:4px;color:var(--text2)}
.cal-event{font-size:9px;padding:2px 4px;border-radius:3px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;font-weight:500}
.cal-nav{display:flex;align-items:center;gap:16px;margin-bottom:16px}
.cal-nav button{background:var(--bg3);border:1px solid var(--bg4);color:var(--text);padding:6px 12px;border-radius:var(--radius);cursor:pointer;font-size:13px;transition:var(--transition)}
.cal-nav button:hover{background:var(--bg4)}
.cal-nav h3{font-size:16px;font-weight:600;min-width:180px;text-align:center}
.cal-sidebar{display:flex;flex-direction:column;gap:8px}
.cal-sidebar-item{padding:10px 12px;background:var(--bg3);border-radius:var(--radius);border-left:3px solid;font-size:12px}
.cal-sidebar-item .time{font-family:'SF Mono',Menlo,monospace;font-size:10px;color:var(--text2)}
.cal-sidebar-item .name{font-weight:600;margin:2px 0}
.cal-sidebar-item .meta{font-size:10px;color:var(--text3)}
.cal-layout{display:grid;grid-template-columns:1fr 280px;gap:20px}
.toggle-wrap{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);margin-bottom:12px}
.toggle{width:36px;height:20px;background:var(--bg4);border-radius:10px;cursor:pointer;position:relative;transition:var(--transition)}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:2px;left:2px;transition:var(--transition)}
.toggle.on::after{left:18px}

/* Kanban */
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;align-items:start}
.kanban-col{background:var(--bg2);border-radius:var(--radius2);padding:12px;border:1px solid var(--bg4)}
.kanban-col-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--bg4)}
.kanban-col-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.kanban-count{font-size:11px;background:var(--bg4);padding:2px 8px;border-radius:10px;color:var(--text2)}
.kanban-card{background:var(--bg3);border:1px solid var(--bg4);border-radius:var(--radius);padding:12px;margin-bottom:8px;cursor:pointer;transition:var(--transition);border-left:3px solid}
.kanban-card:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
.kanban-card:last-child{margin-bottom:0}
.kanban-card .title{font-size:12px;font-weight:600;margin-bottom:6px;line-height:1.3}
.kanban-card .desc{font-size:10px;color:var(--text3);margin-bottom:8px;line-height:1.3}
.kanban-card .meta{display:flex;justify-content:space-between;align-items:center;font-size:10px}
.kanban-card .assignee{color:var(--text2)}

/* Memory Screen */
.memory-section{margin-bottom:20px}
.memory-entry{padding:14px 16px;background:var(--bg3);border:1px solid var(--bg4);border-radius:var(--radius);margin-bottom:8px;cursor:pointer;transition:var(--transition)}
.memory-entry:hover{border-color:rgba(255,107,53,.2)}
.memory-entry .entry-header{display:flex;justify-content:space-between;align-items:center}
.memory-entry .entry-title{font-size:13px;font-weight:600}
.memory-entry .entry-meta{font-size:10px;color:var(--text3);display:flex;gap:12px;margin-top:4px}
.memory-entry .entry-content{margin-top:10px;font-size:12px;color:var(--text2);line-height:1.6;border-top:1px solid var(--bg4);padding-top:10px;display:none}
.memory-entry.expanded .entry-content{display:block}
.memory-entry .expand-icon{color:var(--text3);transition:var(--transition);font-size:12px}
.memory-entry.expanded .expand-icon{transform:rotate(90deg)}
.memory-grid{display:grid;grid-template-columns:1fr 320px;gap:20px}
.openbrain-box{background:var(--bg3);border:1px solid var(--bg4);border-radius:var(--radius2);padding:16px;height:fit-content}
.openbrain-box h4{font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}

/* Team */
.team-tree{display:flex;flex-direction:column;align-items:center;gap:24px}
.team-level{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;width:100%}
.team-card{background:var(--bg3);border:1px solid var(--bg4);border-radius:var(--radius2);padding:16px;width:220px;text-align:center;transition:var(--transition);position:relative}
.team-card:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:rgba(255,107,53,.2)}
.team-card.boss{border-color:var(--accent);width:260px}
.team-card.chief{border-color:var(--accent);width:260px;background:rgba(255,107,53,.05)}
.team-card.hermes{border-color:#9C27B0;width:260px;background:rgba(156,39,176,.05)}
.team-card.inactive{opacity:.55;border-color:var(--bg4)}
.team-card .emoji{font-size:32px;margin-bottom:8px}
.team-card .name{font-size:14px;font-weight:700;margin-bottom:2px}
.team-card .role{font-size:11px;color:var(--accent);font-weight:600;margin-bottom:6px}
.team-card.hermes .role{color:#9C27B0}
.team-card .desc{font-size:11px;color:var(--text2);line-height:1.4}
.team-card .status-badge{position:absolute;top:8px;right:8px;font-size:9px;padding:2px 6px;border-radius:8px;font-weight:700}
.team-card .status-active{background:rgba(102,187,106,.15);color:#66BB6A}
.team-card .status-paused{background:rgba(90,96,112,.2);color:#5a6070}
.team-card .status-pending{background:rgba(255,193,7,.15);color:#FFC107}
.team-card .verticals{margin-top:8px;display:flex;gap:4px;justify-content:center;flex-wrap:wrap}
.team-card .meta-row{margin-top:6px;font-size:10px;color:var(--text3);display:flex;flex-direction:column;gap:2px;text-align:left;padding:6px 8px;background:var(--bg2);border-radius:6px}
.team-card .meta-row span{display:flex;justify-content:space-between}
.team-card .meta-row span em{color:var(--text2);font-style:normal}
.connector{width:2px;height:20px;background:var(--bg4);margin:0 auto}
.connector-h{display:flex;align-items:center;justify-content:center;width:100%}
.connector-h::before{content:'';flex:1;height:2px;background:var(--bg4);max-width:200px}
.team-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:12px;text-align:center}

/* Search */
.search-big{font-size:18px;padding:14px 20px 14px 48px}
.search-wrap.big::before{font-size:20px;left:16px}
.search-results{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.search-result{padding:12px 16px;background:var(--bg3);border:1px solid var(--bg4);border-radius:var(--radius);cursor:pointer;transition:var(--transition)}
.search-result:hover{border-color:rgba(255,107,53,.2)}
.search-result .result-head{display:flex;justify-content:space-between;align-items:center}
.search-result .result-type{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.3px;display:flex;align-items:center;gap:4px}
.search-result .result-title{font-size:13px;font-weight:600;margin:4px 0}
.search-result .result-excerpt{font-size:11px;color:var(--text2);line-height:1.4}
.search-result .result-score{font-size:10px;color:var(--accent);font-family:'SF Mono',Menlo,monospace}
.search-result .result-detail{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--bg4);font-size:12px;color:var(--text2);line-height:1.6}
.search-result.expanded .result-detail{display:block}
.search-stats{font-size:11px;color:var(--text3);margin-bottom:12px}

/* Documents Screen */
.doc-table{width:100%;border-collapse:collapse}
.doc-table th{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding:8px 12px;border-bottom:1px solid var(--bg4);text-align:left}
.doc-row{border-bottom:1px solid var(--bg4);cursor:pointer;transition:var(--transition)}
.doc-row:hover{background:rgba(255,255,255,.02)}
.doc-row td{padding:10px 12px;font-size:12px;vertical-align:middle}
.doc-name{font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px}
.doc-name .ext{font-size:10px;padding:1px 5px;border-radius:4px;font-weight:700;text-transform:uppercase;font-family:'SF Mono',Menlo,monospace}
.ext-md{background:rgba(255,107,53,.15);color:var(--accent)}
.ext-docx{background:rgba(33,150,243,.15);color:#2196F3}
.ext-html{background:rgba(76,175,80,.15);color:#4CAF50}
.ext-pdf{background:rgba(239,83,80,.15);color:#ef5350}
.ext-other{background:rgba(90,96,112,.2);color:var(--text3)}
.doc-date{color:var(--text3);font-family:'SF Mono',Menlo,monospace;font-size:11px}
.doc-size{color:var(--text3);font-family:'SF Mono',Menlo,monospace;font-size:11px;text-align:right}
.doc-stats-bar{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px}

/* Projects Screen */
.projects-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.project-card{background:var(--bg3);border:1px solid var(--bg4);border-radius:var(--radius2);padding:18px;transition:var(--transition);cursor:default}
.project-card:hover{border-color:rgba(255,107,53,.2);transform:translateY(-1px);box-shadow:var(--shadow)}
.project-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.project-name{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
.project-status-badge{font-size:9px;padding:3px 8px;border-radius:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.ps-active{background:rgba(102,187,106,.15);color:#66BB6A}
.ps-growing{background:rgba(33,150,243,.15);color:#2196F3}
.ps-building{background:rgba(255,152,0,.15);color:#FF9800}
.ps-research{background:rgba(233,30,99,.15);color:#E91E63}
.ps-planning{background:rgba(156,39,176,.15);color:#9C27B0}
.ps-monitoring{background:rgba(0,188,212,.15);color:#00BCD4}
.project-desc{font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:12px}
.progress-bar-wrap{margin-bottom:12px}
.progress-label{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:4px}
.progress-bar{height:5px;background:var(--bg4);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .6s ease}
.project-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.proj-stat{text-align:center;padding:6px 4px;background:var(--bg2);border-radius:6px}
.proj-stat-val{font-size:14px;font-weight:700;font-family:'SF Mono',Menlo,monospace}
.proj-stat-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.3px;margin-top:1px}
.project-recent{margin-bottom:10px}
.project-recent h5{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:6px}
.recent-item{font-size:11px;color:var(--text2);padding:3px 0;display:flex;align-items:center;gap:6px}
.recent-item::before{content:'▸';color:var(--accent);font-size:9px}
.project-next{background:var(--bg2);border-radius:var(--radius);padding:10px 12px}
.project-next h5{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:6px}
.next-item{font-size:11px;color:var(--text2);padding:2px 0;display:flex;align-items:center;gap:6px}
.next-item::before{content:'→';color:var(--accent);font-size:9px;font-weight:700}

/* Utility */
.hidden{display:none!important}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}.mt-20{margin-top:20px}
.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}
.text-muted{color:var(--text2)}

/* Animations */
.screen{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Stats bar */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--bg3);border:1px solid var(--bg4);border-radius:var(--radius);padding:14px;text-align:center}
.stat-value{font-size:24px;font-weight:800;font-family:'SF Mono',Menlo,monospace;color:var(--accent)}
.stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

/* Gateway pill in header */
.gw-pills{display:flex;gap:6px;align-items:center}

<div id="pw-gate" style="position:fixed;inset:0;background:#0d0f12;z-index:99999;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,sans-serif">
  <div style="background:#141820;border:1px solid #222838;border-radius:12px;padding:40px 48px;width:320px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.6)">
    <div style="font-size:28px;margin-bottom:8px">🦞</div>
    <h2 style="color:#FF6B35;font-size:18px;font-weight:700;margin-bottom:4px;letter-spacing:.5px">Mission Control</h2>
    <p style="color:#5a6070;font-size:12px;margin-bottom:24px">Enter password to continue</p>
    <input id="pw-input" type="password" placeholder="Password" autocomplete="current-password"
      style="width:100%;padding:10px 14px;background:#0d0f12;border:1px solid #222838;border-radius:8px;color:#e8eaed;font-size:14px;outline:none;transition:border-color .2s;margin-bottom:8px"
      onfocus="this.style.borderColor='#FF6B35'" onblur="this.style.borderColor='#222838'"
      onkeydown="if(event.key==='Enter')checkPw()">
    <div id="pw-err" style="color:#f85149;font-size:12px;height:16px;margin-bottom:8px"></div>
    <button onclick="checkPw()" style="width:100%;padding:10px;background:#FF6B35;border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:background .2s" onmouseover="this.style.background='#ff8f65'" onmouseout="this.style.background='#FF6B35'">Enter</button>
  </div>
</div>
<style>
@keyframes pw-shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
.pw-shake{animation:pw-shake .4s ease}
</style>
<script>
(function(){
  if(sessionStorage.getItem('mc_auth')==='1'){
    document.getElementById('pw-gate').style.display='none';
  }
})();
function checkPw(){
  var input=document.getElementById('pw-input');
  var err=document.getElementById('pw-err');
  if(input.value==='soccer12'){
    sessionStorage.setItem('mc_auth','1');
    document.getElementById('pw-gate').style.display='none';
  } else {
    err.textContent='Wrong password';
    input.classList.remove('pw-shake');
    void input.offsetWidth;
    input.classList.add('pw-shake');
    input.value='';
    input.focus();
  }
}
</script>

function $(sel,ctx){return(ctx||document).querySelector(sel)}
function $$(sel,ctx){return[...(ctx||document).querySelectorAll(sel)]}
function h(tag,attrs,children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='className')el.className=v;
    else if(k==='innerHTML')el.innerHTML=v;
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  });
  if(typeof children==='string')el.innerHTML=children;
  else if(Array.isArray(children))children.forEach(c=>{if(c)el.appendChild(typeof c==='string'?document.createTextNode(c):c)});
  return el;
}

  const prevLast=new Date(calYear,calMonth,0).getDate();
  const today=new Date();
  const todayStr=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

  function getEventsForDate(y,m,d){
    const dateStr=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayOfWeek=new Date(y,m,d).getDay();
    const events=[];
    CALENDAR_EVENTS.forEach(ev=>{
      if(ev.date&&ev.date===dateStr){events.push(ev);return}
      if(ev.recurring==='daily'){events.push(ev);return}
      if(ev.recurring==='weekly'&&dayOfWeek===ev.day){events.push(ev);return}
      if(ev.recurring==='monthly'&&d===ev.dayOfMonth){events.push(ev);return}
    });
    return events;
  }

  let grid='';
  dayNames.forEach(d=>{grid+=`<div class="cal-header-cell">${d}</div>`});

  let cellDay=1;let nextDay=1;
  for(let i=0;i<42;i++){
    let day,month=calMonth,year=calYear,otherMonth=false;
    if(i<startDay){day=prevLast-startDay+i+1;month=calMonth-1;otherMonth=true}
    else if(cellDay>daysInMonth){day=nextDay++;month=calMonth+1;otherMonth=true}
    else{day=cellDay++}
    if(month<0){month=11;year--}if(month>11){month=0;year++}

    const dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isToday=dateStr===todayStr;
    const events=otherMonth?[]:getEventsForDate(year,month,day);

    grid+=`<div class="cal-cell${isToday?' today':''}${otherMonth?' other-month':''}">
      <div class="cal-day">${day}</div>`;
    events.slice(0,3).forEach(ev=>{
      grid+=`<div class="cal-event" style="background:${vcolor(ev.vertical)}22;color:${vcolor(ev.vertical)};border-left:2px solid ${vcolor(ev.vertical)}" title="${ev.name} (${ev.time})">${ev.name}</div>`;
    });
    if(events.length>3)grid+=`<div style="font-size:9px;color:var(--text3)">+${events.length-3} more</div>`;
    grid+=`</div>`;
  }

  let upcoming='';
  for(let d=0;d<7;d++){
    const date=new Date(today);date.setDate(today.getDate()+d);
    const events=getEventsForDate(date.getFullYear(),date.getMonth(),date.getDate());
    const label=d===0?'Today':d===1?'Tomorrow':date.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    events.forEach(ev=>{
      upcoming+=`<div class="cal-sidebar-item" style="border-left-color:${vcolor(ev.vertical)}">
        <div class="time">${label} · ${ev.time}</div>
        <div class="name">${ev.name}</div>
        <div class="meta"><span class="tag ${vc(ev.vertical)}" style="font-size:9px">${ev.vertical}</span> · ${ev.type} · ${ev.tokens}</div>
      </div>`;
    });
  }
  CALENDAR_EVENTS.filter(ev=>ev.highlight).forEach(ev=>{
    upcoming+=`<div class="cal-sidebar-item" style="border-left-color:${vcolor(ev.vertical)};background:rgba(255,107,53,.05)">
      <div class="time" style="color:var(--accent)">${ev.date} · ${ev.time}</div>
      <div class="name" style="color:var(--accent)">${ev.name}</div>
      <div class="meta"><span class="tag ${vc(ev.vertical)}" style="font-size:9px">${ev.vertical}</span> · ⭐ Key Date</div>
    </div>`;
  });

  return `<div class="screen">
    <div class="screen-title">Calendar & Scheduled Tasks</div>
    <div class="screen-subtitle">Cron jobs, reminders, and upcoming events</div>
    <div class="toggle-wrap">
      <div class="toggle ${showCompleted?'on':''}" onclick="showCompleted=!showCompleted;this.classList.toggle('on')"></div>
      <span>Show completed tasks</span>
    </div>
    <div class="cal-layout">
      <div>
        <div class="cal-nav">
          <button onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--}renderScreen()">◀</button>
          <h3>${monthNames[calMonth]} ${calYear}</h3>
          <button onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++}renderScreen()">▶</button>
          <button onclick="calMonth=${today.getMonth()};calYear=${today.getFullYear()};renderScreen()" style="margin-left:auto;font-size:11px">Today</button>
        </div>
        <div class="calendar-grid">${grid}</div>
      </div>
      <div>
        <div class="card-title mb-12" style="font-size:14px;font-weight:700">📅 Upcoming (7 days + Key Dates)</div>
        <div class="cal-sidebar">${upcoming||'<div style="color:var(--text3);font-size:12px;padding:12px">No upcoming events</div>'}</div>
      </div>
    </div>
  </div>`;
}

function renderSearch(){
  let results='';
  let stats='';
  const pills=['All','Memories','Tasks','Documents','Activity'];
  const typeMap={All:'all',Memories:'memory',Tasks:'task',Documents:'document',Activity:'activity'};

  if(searchQuery){
    const q=searchQuery.toLowerCase();
    let filtered=SEARCH_INDEX.filter(item=>{
      const text=(item.title+' '+item.excerpt+' '+item.content).toLowerCase();
      return text.includes(q);
    });
    if(window.searchFilter&&window.searchFilter!=='all'){
      filtered=filtered.filter(i=>i.type===window.searchFilter);
    }
    filtered=filtered.map(item=>{
      const text=(item.title+' '+item.excerpt+' '+item.content).toLowerCase();
      let score=0;
      if(item.title.toLowerCase().includes(q))score+=50;
      if(item.excerpt.toLowerCase().includes(q))score+=30;
      const matches=(text.match(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'))||[]).length;
      score+=matches*10;
      return{...item,score:Math.min(score,99)};
    }).sort((a,b)=>b.score-a.score);

    stats=`<div class="search-stats">${filtered.length} result${filtered.length!==1?'s':''} for "${searchQuery}"</div>`;
    filtered.forEach(item=>{
      const highlight=(text)=>{
        const regex=new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi');
        return text.replace(regex,'<mark style="background:rgba(255,107,53,.3);color:var(--text);border-radius:2px;padding:0 1px">$1</mark>');
      };
      results+=`<div class="search-result" onclick="this.classList.toggle('expanded')">
        <div class="result-head">
          <span class="result-type">${item.icon} ${item.type}</span>
          <span class="result-score">${item.score}% match</span>
        </div>
        <div class="result-title">${highlight(item.title)}</div>
        <div class="result-excerpt">${highlight(item.excerpt)}</div>
        <div class="result-detail">${highlight(item.content)}<br><br><span style="color:var(--text3);font-size:10px">Date: ${item.date} · Source: ${item.type}</span></div>
      </div>`;
    });
    if(!filtered.length)results='<div style="padding:24px;text-align:center;color:var(--text3)">No results found</div>';
  } else {
    stats=`<div class="search-stats">${SEARCH_INDEX.length} items indexed · Type to search across all memories, tasks, documents, and activity</div>`;
    results=`<div style="padding:40px;text-align:center;color:var(--text3)">
      <div style="font-size:48px;margin-bottom:12px;opacity:.3">🔍</div>
      <div style="font-size:14px">Search across all of Rob's knowledge base</div>
      <div style="font-size:11px;margin-top:4px">Memories · Tasks · Documents · Activity Feed</div>
    </div>`;
  }

  if(!window.searchFilter)window.searchFilter='all';
  return `<div class="screen">
    <div class="screen-title">Global Search</div>
    <div class="screen-subtitle">Search across memories, tasks, documents, and activity</div>
    <div class="search-wrap big">
      <input class="search-input search-big" placeholder="Search everything..." value="${searchQuery}" oninput="searchQuery=this.value;renderSearchResults()">
    </div>
    <div class="filter-bar">
      ${pills.map(p=>`<div class="filter-pill ${window.searchFilter===(typeMap[p]||'all')?'active':''}" onclick="window.searchFilter='${typeMap[p]}';renderScreen()">${p}</div>`).join('')}
    </div>
    ${stats}
    <div class="search-results" id="searchResults">${results}</div>
  </div>`;
}

  filtered=filtered.map(item=>{

    if(item.excerpt.toLowerCase().includes(q))score+=30;
    const matches=(text.match(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'))||[]).length;

function renderDocuments(){
  const cats=['All','Reports','Investing','ReBolt','TLC','World Cup Pool','Lobster Press','Other'];
  const extIcon={md:'md',docx:'docx',html:'html',pdf:'pdf'};
  const extClass={md:'ext-md',docx:'ext-docx',html:'ext-html',pdf:'ext-pdf'};

  let filtered=DOCUMENTS_DATA.filter(d=>{
    const catOk=docCatFilter==='All'||d.cat===docCatFilter;
    const q=docSearch.toLowerCase();
    const nameOk=!q||(d.name+' '+d.path+' '+d.cat).toLowerCase().includes(q);
    return catOk&&nameOk;
  });

  const catCounts={};
  DOCUMENTS_DATA.forEach(d=>{catCounts[d.cat]=(catCounts[d.cat]||0)+1});

  const rows=filtered.map(d=>{
    const ext=d.ext;
    const ecls=extClass[ext]||'ext-other';
    const icon=ext==='md'?'📝':ext==='docx'?'📄':ext==='html'?'🌐':ext==='pdf'?'📋':'📁';
    return `<tr class="doc-row">
      <td><div class="doc-name"><span class="${ecls} ext">${ext}</span>${icon} ${d.name}</div><div style="font-size:10px;color:var(--text3);margin-top:2px;padding-left:50px">${d.path}</div></td>
      <td><span class="tag tag-${d.cat==='TLC'?'tlc':d.cat==='Investing'?'investing':d.cat==='ReBolt'?'rebolt':d.cat==='World Cup Pool'?'pool':d.cat==='Lobster Press'?'lobsterpress':d.cat==='Reports'?'all':'personal'}">${d.cat}</span></td>
      <td class="doc-date">${d.date}</td>
      <td class="doc-size">${d.size}</td>
    </tr>`;
  }).join('');

  return `<div class="screen">
    <div class="screen-title">Documents</div>
    <div class="screen-subtitle">All reports and documents created by Rob — ${DOCUMENTS_DATA.length} files across all verticals</div>
    <div class="doc-stats-bar" style="grid-template-columns:repeat(${Math.min(cats.length-1,5)},1fr);gap:10px;margin-bottom:20px">
      ${cats.filter(c=>c!=='All').map(c=>`<div class="stat-card" style="padding:10px">
        <div class="stat-value" style="font-size:20px">${catCounts[c]||0}</div>
        <div class="stat-label">${c}</div>
      </div>`).join('')}
    </div>
    <div style="display:flex;gap:12px;margin-bottom:12px;align-items:center">
      <div class="search-wrap" style="flex:1;margin-bottom:0">
        <input class="search-input" placeholder="Search documents..." value="${docSearch}" oninput="docSearch=this.value;renderScreen()">
      </div>
    </div>
    <div class="filter-bar">
      ${cats.map(c=>`<div class="filter-pill ${docCatFilter===c?'active':''}" onclick="docCatFilter='${c}';renderScreen()">${c}${c==='All'?` (${DOCUMENTS_DATA.length})`:catCounts[c]?` (${catCounts[c]})`:''}${c!=='All'&&!catCounts[c]?' (0)':''}</div>`).join('')}
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <table class="doc-table">
        <thead><tr>
          <th>Document</th>
          <th>Category</th>
          <th>Date Modified</th>
          <th style="text-align:right">Size</th>
        </tr></thead>
        <tbody>
          ${rows||`<tr><td colspan="4" style="padding:24px;text-align:center;color:var(--text3)">No documents found</td></tr>`}
        </tbody>
      </table>
    </div>
    <div style="margin-top:12px;font-size:11px;color:var(--text3)">
      Showing ${filtered.length} of ${DOCUMENTS_DATA.length} documents · 
      <span style="color:var(--accent)">Tip:</span> Run <code style="background:var(--bg4);padding:1px 5px;border-radius:3px">python3 refresh-mission-control.py</code> to update with latest files
    </div>
  </div>`;
}

// ── AI Cost Screen ──────────────────────────────────────────────
const MGMT_KEY = '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';
let costData = null;
let costLoading = false;

const MODEL_COLORS = {
  'anthropic/claude-sonnet-4.6': '#e8562a',
  'anthropic/claude-opus-4.6': '#c94520',
  'moonshotai/kimi-k2-thinking': '#7c3aed',
  'google/gemini-3-flash-preview': '#2563eb',

const MODEL_LABELS = {
  'anthropic/claude-sonnet-4.6': 'Claude Sonnet 4.6',
  'anthropic/claude-opus-4.6': 'Claude Opus 4.6',
  'moonshotai/kimi-k2-thinking': 'Kimi K2 Thinking',

};

async function fetchCostData() {
  costLoading = true;
  try {
    const [keyRes, actRes] = await Promise.all([
      fetch('https://openrouter.ai/api/v1/auth/key', { headers: { 'Authorization': 'Bearer ' + MGMT_KEY } }),
      fetch('https://openrouter.ai/api/v1/activity?offset=0&limit=500', { headers: { 'Authorization': 'Bearer ' + MGMT_KEY } })
    ]);
    const keyJson = await keyRes.json();
    const actJson = await actRes.json();
    costData = { key: keyJson.data, activity: actJson.data || [] };
  } catch(e) {
    costData = { error: e.message };
  }
  costLoading = false;
  if (currentScreen === 'costs') renderScreen();
}

function renderCosts() {
  if (!costData && !costLoading) { fetchCostData(); return `<div class="screen"><div class="screen-title">💰 AI Costs</div><div style="color:var(--text2);margin-top:40px;text-align:center">Loading cost data…</div></div>`; }
  if (costLoading) return `<div class="screen"><div class="screen-title">💰 AI Costs</div><div style="color:var(--text2);margin-top:40px;text-align:center">⏳ Fetching from OpenRouter…</div></div>`;
  if (costData?.error) return `<div class="screen"><div class="screen-title">💰 AI Costs</div><div style="color:#f87171;margin-top:20px">Error: ${costData.error}</div></div>`;

  const k = costData.key || {};
  const activity = costData.activity || [];

  // Aggregate
  const byModel = {};
  const byDate = {};
  const today = new Date().toISOString().slice(0,10);
  const yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);

  activity.forEach(r => {
    const m = r.model || r.model_permaslug || 'unknown';
    const d = (r.date || '').slice(0,10);
    const cost = r.usage || 0;
    if (!byModel[m]) byModel[m] = { cost:0, requests:0, tokens:0 };
    byModel[m].cost += cost;
    byModel[m].requests += r.requests || 0;
    byModel[m].tokens += (r.prompt_tokens||0) + (r.completion_tokens||0);
    if (!byDate[d]) byDate[d] = 0;
    byDate[d] += cost;
  });

  const todaySpend = byDate[today] || 0;
  const yesterdaySpend = byDate[yesterday] || 0;
  const weeklySpend = k.usage_weekly || 0;
  const monthlySpend = k.usage_monthly || 0;
  const credits = 45; // known top-up amount
  const remaining = credits - monthlySpend;
  const pct = Math.min(100, (monthlySpend / credits * 100)).toFixed(0);

  // Sort models by cost
  const sortedModels = Object.entries(byModel).sort((a,b) => b[1].cost - a[1].cost);

  // Build bar chart for last 7 days
  const last7 = [];
  for (let i=6; i>=0; i--) {
    const d = new Date(Date.now() - i*86400000).toISOString().slice(0,10);
    last7.push({ date: d, label: new Date(Date.now()-i*86400000).toLocaleDateString('en-US',{weekday:'short'}), cost: byDate[d]||0 });
  }
  const maxDay = Math.max(...last7.map(d=>d.cost), 0.01);

  const dayChange = yesterdaySpend > 0 ? ((todaySpend - yesterdaySpend) / yesterdaySpend * 100).toFixed(0) : null;
  const changeHtml = dayChange !== null ? `<span style="font-size:12px;color:${dayChange>0?'#f87171':'#4ade80'}">${dayChange>0?'▲':'▼'}${Math.abs(dayChange)}% vs yesterday</span>` : '';

  return `<div class="screen">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
      <div class="screen-title">💰 AI Costs</div>
      <button onclick="costData=null;fetchCostData()" style="background:var(--accent);border:none;color:#fff;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600">↻ Refresh</button>
    </div>
    <div class="screen-subtitle">Live via OpenRouter · All models · Updated just now</div>

    <!-- Summary Cards -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px">
      <div style="background:var(--bg3);border:1px solid var(--bg4);border-radius:8px;padding:16px">
        <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Today</div>
        <div style="font-size:28px;font-weight:700;color:var(--text)">$${todaySpend.toFixed(2)}</div>
        <div style="margin-top:4px;font-size:12px">${changeHtml}</div>
      </div>
      <div style="background:var(--bg3);border:1px solid var(--bg4);border-radius:8px;padding:16px">
        <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Yesterday</div>
        <div style="font-size:28px;font-weight:700;color:var(--text)">$${yesterdaySpend.toFixed(2)}</div>
      </div>
      <div style="background:var(--bg3);border:1px solid var(--bg4);border-radius:8px;padding:16px">
        <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">This Week</div>
        <div style="font-size:28px;font-weight:700;color:var(--text)">$${weeklySpend.toFixed(2)}</div>
      </div>
      <div style="background:var(--bg3);border:1px solid var(--bg4);border-radius:8px;padding:16px">
        <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">This Month</div>
        <div style="font-size:28px;font-weight:700;color:${monthlySpend > credits*0.8 ? '#f87171' : 'var(--text)'}">$${monthlySpend.toFixed(2)}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:4px">$${remaining.toFixed(2)} remaining of $${credits}</div>
      </div>
    </div>

    <!-- Budget Bar -->
    <div style="background:var(--bg3);border:1px solid var(--bg4);border-radius:8px;padding:16px;margin-bottom:24px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:13px;font-weight:600">Monthly Budget</span>
        <span style="font-size:13px;color:var(--text2)">${pct}% used · $${monthlySpend.toFixed(2)} of $${credits}</span>
      </div>
      <div style="background:var(--bg4);border-radius:4px;height:10px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${pct>80?'#f87171':pct>60?'#fbbf24':'var(--accent)'};border-radius:4px;transition:.3s"></div>
      </div>
    </div>

    <!-- Two columns: bar chart + model breakdown -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px">

      <!-- 7-day bar chart -->
      <div style="background:var(--bg3);border:1px solid var(--bg4);border-radius:8px;padding:16px">
        <div style="font-size:13px;font-weight:600;margin-bottom:16px">📈 Last 7 Days</div>
        <div style="display:flex;align-items:flex-end;gap:6px;height:120px">
          ${last7.map(d => {
            const h = Math.max(4, (d.cost / maxDay * 100));
            const isToday = d.date === today;
            return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
              <div style="font-size:9px;color:var(--text3)">$${d.cost.toFixed(2)}</div>
              <div style="width:100%;height:${h}px;background:${isToday?'var(--accent)':'var(--bg4)'};border-radius:3px 3px 0 0;transition:.3s"></div>
              <div style="font-size:10px;color:${isToday?'var(--accent)':'var(--text3)'}">${d.label}</div>
            </div>`;
          }).join('')}
        </div>
      </div>

      <!-- Model breakdown -->
      <div style="background:var(--bg3);border:1px solid var(--bg4);border-radius:8px;padding:16px">
        <div style="font-size:13px;font-weight:600;margin-bottom:16px">🤖 By Model</div>
        ${sortedModels.map(([m, v]) => {
          const label = MODEL_LABELS[m] || m.split('/').pop();
          const color = MODEL_COLORS[m] || '#6b7280';
          const pctOfMonth = monthlySpend > 0 ? (v.cost/monthlySpend*100).toFixed(0) : 0;
          return `<div style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;margin-bottom:3px">
              <span style="font-size:12px;color:var(--text)">${label}</span>
              <span style="font-size:12px;font-weight:600;color:var(--text)">$${v.cost.toFixed(3)}</span>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              <div style="flex:1;background:var(--bg4);border-radius:3px;height:6px">
                <div style="width:${pctOfMonth}%;height:100%;background:${color};border-radius:3px"></div>
              </div>
              <span style="font-size:10px;color:var(--text3);white-space:nowrap">${v.requests} reqs · ${(v.tokens/1000).toFixed(0)}K tok</span>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- Per-day table -->
    <div style="background:var(--bg3);border:1px solid var(--bg4);border-radius:8px;padding:16px">
      <div style="font-size:13px;font-weight:600;margin-bottom:12px">📅 Daily History</div>
      <table style="width:100%;border-collapse:collapse">
        <thead><tr>
          <th style="text-align:left;font-size:11px;color:var(--text3);padding:6px 8px;border-bottom:1px solid var(--bg4)">Date</th>
          <th style="text-align:right;font-size:11px;color:var(--text3);padding:6px 8px;border-bottom:1px solid var(--bg4)">Spend</th>
        </tr></thead>
        <tbody>
          ${Object.entries(byDate).sort((a,b)=>b[0].localeCompare(a[0])).map(([d,c])=>{
            const isToday = d===today;
            return `<tr style="border-bottom:1px solid var(--bg4)">
              <td style="padding:8px;font-size:13px;color:${isToday?'var(--accent)':'var(--text)'}">${d}${isToday?' (today)':''}</td>
              <td style="padding:8px;font-size:13px;font-weight:${isToday?'700':'400'};color:${isToday?'var(--accent)':'var(--text)'};text-align:right">$${c.toFixed(4)}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
}

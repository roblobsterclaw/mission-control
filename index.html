<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🦞 Mission Control — Rob Lobster</title>
  <style>
    /* ===================== RESET & BASE ===================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0D1117;
      --card:      #161B22;
      --card2:     #0D1117;
      --border:    #30363D;
      --accent:    #FF6B35;
      --text:      #E6EDF3;
      --muted:     #8B949E;
      --green:     #3FB950;
      --yellow:    #D29922;
      --red:       #F85149;
      --blue:      #58A6FF;
      --purple:    #BC8CFF;
      --teal:      #39D353;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ===================== HEADER ===================== */
    .header {
      position: sticky;
      top: 0;
      z-index: 200;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-text {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 2px;
      color: var(--accent);
      text-transform: uppercase;
    }

    .logo-sub {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .header-divider {
      width: 1px;
      height: 28px;
      background: var(--border);
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--green);
    }

    .live-dot {
      width: 6px;
      height: 6px;
      background: var(--green);
      border-radius: 50%;
      animation: livePulse 1.5s ease-in-out infinite;
    }

    @keyframes livePulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .header-meta {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    .header-meta span { color: var(--text); }

    #refresh-countdown {
      font-size: 11px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .btn-refresh {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 7px 16px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn-refresh:hover  { opacity: 0.88; }
    .btn-refresh:active { transform: scale(0.97); }
    .btn-refresh:disabled { opacity: 0.5; cursor: default; }

    /* ===================== LAYOUT ===================== */
    .main {
      max-width: 1600px;
      margin: 0 auto;
      padding: 18px 18px 40px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      white-space: nowrap;
    }

    .section-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .section-count {
      font-size: 10px;
      color: var(--muted);
      background: var(--border);
      padding: 1px 7px;
      border-radius: 10px;
      font-weight: 600;
    }

    .mb-20 { margin-bottom: 20px; }
    .mb-16 { margin-bottom: 16px; }

    /* ===================== PANEL 1: AGENTS (EKG) ===================== */
    .agents-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 22px;
    }

    .agent-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      flex: 1;
      min-width: 260px;
      max-width: 460px;
      position: relative;
      overflow: visible;
      border-top-width: 3px;
    }

    .agent-card::after { display: none; }

    .agent-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .agent-name {
      font-size: 14px;
      font-weight: 700;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
    }

    .status-badge.active  { background: rgba(63,185,80,0.12); color: var(--green); border: 1px solid rgba(63,185,80,0.25); }
    .status-badge.online  { background: rgba(56,132,244,0.12); color: #388AF4; border: 1px solid rgba(56,132,244,0.25); }
    .status-badge.offline { background: rgba(248,81,73,0.12); color: var(--red); border: 1px solid rgba(248,81,73,0.25); }
    .status-badge.idle    { background: rgba(139,148,158,0.10); color: var(--muted); border: 1px solid rgba(139,148,158,0.2); }
    .status-badge.queued  { background: rgba(210,153,34,0.12); color: var(--yellow); border: 1px solid rgba(210,153,34,0.25); }
    .status-badge.failed  { background: rgba(248,81,73,0.12); color: var(--red); border: 1px solid rgba(248,81,73,0.25); }

    .pulse-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: pulseDot 2s ease-in-out infinite;
    }

    @keyframes pulseDot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.75); }
    }

    /* ─── EKG Canvas ─── */
    .ekg-canvas-wrap {
      margin: 0 0 10px;
      border-radius: 6px;
      overflow: hidden;
      background: #080D11;
      border: 1px solid rgba(255,255,255,0.06);
      height: 72px;
    }

    .ekg-canvas {
      display: block;
      width: 100%;
      height: 72px;
    }

    /* ─── Agent info ─── */
    .agent-task       { font-size: 12px; color: var(--text); margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .agent-task.empty { color: var(--muted); font-style: italic; }

    .agent-meta      { display: flex; gap: 14px; flex-wrap: wrap; }
    .agent-meta-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--muted); }
    .agent-meta-item strong { color: var(--text); font-weight: 500; }

    /* ─── Sub-agent toggle & dropdown ─── */
    .sa-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 0 0;
      margin-top: 8px;
      border-top: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
    }

    .sa-toggle:hover .sa-toggle-label,
    .sa-toggle:hover .sa-toggle-arrow { color: var(--accent); }

    .sa-toggle-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      flex: 1;
      transition: color 0.15s;
    }

    .sa-toggle-count {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      background: var(--border);
      padding: 1px 7px;
      border-radius: 10px;
    }

    .sa-toggle-arrow {
      font-size: 9px;
      color: var(--muted);
      transition: color 0.15s, transform 0.2s;
    }

    .sa-toggle-arrow.open { transform: rotate(180deg); }

    .sa-dropdown {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease-out;
    }

    .sa-dropdown.open {
      max-height: 500px;
      transition: max-height 0.4s ease-in;
    }

    .sa-list {
      padding-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .sa-empty {
      font-size: 11px;
      color: var(--muted);
      font-style: italic;
      padding: 4px 0 2px;
    }

    .sa-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 9px;
      background: rgba(0,0,0,0.3);
      border-radius: 6px;
      border: 1px solid var(--border);
      transition: opacity 0.15s;
    }

    .sa-row.sa-done { opacity: 0.5; }

    .sa-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .sa-dot.sa-pulse { animation: pulseDot 2s ease-in-out infinite; }

    .sa-body { flex: 1; min-width: 0; }

    .sa-task {
      font-size: 11px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
    }

    .sa-meta {
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sa-status-running   { color: var(--green); font-weight: 700; }
    .sa-status-completed { color: var(--muted); }

    /* ===================== CRON TABLE LAYOUT ===================== */
    .cron-layout {
      display: grid;
      grid-template-columns: 1fr 290px;
      gap: 16px;
      margin-bottom: 20px;
      align-items: start;
    }

    /* ─── Job Groups Container ─── */
    .job-groups {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ─── Group block ─── */
    .job-group {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .job-group-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid var(--border);
    }

    .job-group-icon {
      font-size: 14px;
    }

    .job-group-title {
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
    }

    .job-group-badge {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      background: rgba(255,255,255,0.06);
      padding: 1px 8px;
      border-radius: 10px;
    }

    .job-group-line {
      flex: 1;
      height: 1px;
      background: var(--border);
      opacity: 0.5;
    }

    /* ─── Scrollable table wrapper ─── */
    .table-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* ─── Job Table ─── */
    .job-table {
      width: 100%;
      min-width: 640px;
      border-collapse: collapse;
      font-size: 12px;
    }

    .job-table thead tr {
      background: rgba(0,0,0,0.2);
    }

    .job-table th {
      text-align: left;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      padding: 7px 12px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    .job-table td {
      padding: 9px 12px;
      border-bottom: 1px solid rgba(48,54,61,0.5);
      vertical-align: middle;
    }

    .job-table tbody tr:last-child td {
      border-bottom: none;
    }

    /* Row status via left border using box-shadow hack (no border-left on tr) */
    .job-table tbody tr {
      position: relative;
      transition: background 0.1s;
    }

    .job-table tbody tr:hover {
      background: rgba(255,255,255,0.025);
    }

    /* Left-border stripe via first-cell box-shadow */
    .col-job {
      position: relative;
      padding-left: 16px !important;
    }

    .col-job::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      border-radius: 0 2px 2px 0;
    }

    .row-ok   .col-job::before { background: var(--green); }
    .row-fail .col-job::before { background: var(--red); }
    .row-warn .col-job::before { background: var(--yellow); }
    .row-idle .col-job::before { background: var(--border); }

    /* ─── Column-specific styles ─── */
    .job-name-text {
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
    }

    .job-err-badge {
      display: inline-block;
      background: var(--red);
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 8px;
      margin-left: 5px;
      vertical-align: middle;
      letter-spacing: 0.2px;
    }

    .col-sched {
      color: var(--muted);
      white-space: nowrap;
      font-size: 11px;
    }

    /* ─── Model cell ─── */
    .col-cost {
      font-size: 11px;
      white-space: nowrap;
      text-align: right;
      font-family: monospace;
      min-width: 80px;
    }
    .cost-free  { color: var(--green); }
    .cost-low   { color: var(--green); }
    .cost-med   { color: var(--yellow); }
    .cost-high  { color: #ff6b6b; font-weight: 700; }
    .cost-unknown { color: var(--muted); }
    .cost-mo {
      display: block;
      font-size: 9px;
      color: var(--muted);
      margin-top: 1px;
    }
    .model-cell {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }

    .model-tier-free { color: var(--green); font-size: 11px; }
    .model-tier-paid { color: var(--yellow); font-size: 11px; }

    .model-name-text {
      font-size: 11px;
      color: var(--text);
      font-weight: 500;
    }

    /* ─── Last run cell ─── */
    .col-last {
      font-size: 11px;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .last-ok   { color: var(--green); }
    .last-fail { color: var(--red); }
    .last-wait { color: var(--muted); }

    /* ─── Status pill ─── */
    .st-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 12px;
      white-space: nowrap;
    }

    .st-ok   { background: rgba(63,185,80,0.12);  color: var(--green);  border: 1px solid rgba(63,185,80,0.25); }
    .st-fail { background: rgba(248,81,73,0.12);  color: var(--red);    border: 1px solid rgba(248,81,73,0.25); }
    .st-warn { background: rgba(210,153,34,0.12); color: var(--yellow); border: 1px solid rgba(210,153,34,0.25); }
    .st-wait { background: rgba(88,166,255,0.08); color: var(--blue);   border: 1px solid rgba(88,166,255,0.2); }

    .st-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .st-ok   .st-dot { background: var(--green);  animation: pulseDot 2s ease-in-out infinite; }
    .st-fail .st-dot { background: var(--red); }
    .st-warn .st-dot { background: var(--yellow); }
    .st-wait .st-dot { background: var(--blue); opacity: 0.6; }

    /* ─── Next run cell ─── */
    .col-next {
      font-size: 11px;
      color: var(--accent);
      font-weight: 600;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .col-next.overdue { color: var(--red); }

    /* ─── Empty group ─── */
    .job-table-empty {
      text-align: center;
      padding: 18px;
      color: var(--muted);
      font-size: 11px;
      font-style: italic;
    }

    /* ===================== PANEL 3: EFFICIENCY ===================== */
    .efficiency-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: sticky;
      top: 68px;
    }

    .panel-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .pie-wrap { display: flex; justify-content: center; }
    #pie-canvas { display: block; }

    .legend-list { display: flex; flex-direction: column; gap: 5px; }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
    }

    .legend-swatch {
      width: 10px;
      height: 10px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .legend-model { flex: 1; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .legend-pct   { color: var(--muted); font-size: 10px; width: 30px; text-align: right; }
    .legend-cost  { color: var(--text); font-weight: 700; font-size: 11px; width: 42px; text-align: right; }

    .savings-card {
      background: rgba(63,185,80,0.06);
      border: 1px solid rgba(63,185,80,0.2);
      border-radius: 8px;
      padding: 11px 12px;
    }

    .savings-tag    { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--green); margin-bottom: 4px; }
    .savings-number { font-size: 26px; font-weight: 900; color: var(--green); line-height: 1; margin-bottom: 5px; }
    .savings-desc   { font-size: 10px; color: var(--muted); line-height: 1.4; }

    .spend-row    { display: flex; justify-content: space-between; align-items: center; font-size: 11px; padding: 3px 0; }
    .spend-label  { color: var(--muted); }
    .spend-val    { color: var(--text); font-weight: 700; }
    .spend-val.accent { color: var(--accent); font-size: 13px; }

    .divider { height: 1px; background: var(--border); }

    /* ===================== BOTTOM ROW ===================== */
    .bottom-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    /* ===================== PANEL 4: ALERTS ===================== */
    .panel-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
    }

    .alert-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 360px;
      overflow-y: auto;
      padding-right: 2px;
    }

    .alert-item {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 11px;
      display: flex;
      align-items: flex-start;
      gap: 9px;
    }

    .alert-item.dismissed { display: none; }

    .alert-sev {
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 3px 7px;
      border-radius: 5px;
      white-space: nowrap;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .alert-sev.critical { background: rgba(248,81,73,0.15); color: var(--red); }
    .alert-sev.warning  { background: rgba(210,153,34,0.15); color: var(--yellow); }
    .alert-sev.info     { background: rgba(88,166,255,0.15); color: var(--blue); }

    .alert-body { flex: 1; min-width: 0; }

    .alert-job  { font-size: 11px; font-weight: 700; color: var(--text); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .alert-msg  { font-size: 11px; color: var(--muted); line-height: 1.4; }
    .alert-time { font-size: 10px; color: var(--muted); margin-top: 4px; opacity: 0.7; }

    .btn-dismiss {
      flex-shrink: 0;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      width: 22px;
      height: 22px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      margin-top: 1px;
    }

    .btn-dismiss:hover { background: var(--border); color: var(--text); }

    .no-alerts {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      padding: 24px 0;
    }

    /* ===================== PANEL 5: PROJECTS ===================== */
    .projects-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
    }

    .proj-card {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 8px;
      border-left: 3px solid transparent;
      padding: 10px 11px;
    }

    .proj-card.healthy  { border-left-color: var(--green); }
    .proj-card.degraded { border-left-color: var(--yellow); }
    .proj-card.failed   { border-left-color: var(--red); }
    .proj-card.active   { border-left-color: var(--accent); }

    .proj-header { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
    .proj-emoji  { font-size: 15px; }
    .proj-name   { font-size: 12px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .proj-status           { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; }
    .proj-status.healthy   { color: var(--green); }
    .proj-status.degraded  { color: var(--yellow); }
    .proj-status.failed    { color: var(--red); }
    .proj-status.active    { color: var(--accent); }

    .proj-metric { font-size: 11px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
    .proj-detail { font-size: 10px; color: var(--muted); line-height: 1.35; }

    /* ===================== PANEL 6: AI COSTS ===================== */
    .cost-cards {
      display: grid;

<script>
'use strict';

// ─── Config ────────────────────────────────────────────────────────
const DATA_URL     = 'data/status.json';
const REFRESH_SECS = 60;

// ─── Pie chart colors ───────────────────────────────────────────────
const MODEL_COLORS = {
  'anthropic/claude-opus-4-6':   '#FF6B35',
  'anthropic/claude-sonnet-4-6': '#F0A500',
  'openai/gpt-5.4-mini':         '#58A6FF',
  'openai/gpt-5.4-nano':         '#BC8CFF',
  'openai/gpt-4.1-mini':         '#3FB950',
  'google/gemma-4-31b:free':     '#34D399',
  'qwen/qwen3-coder:free':       '#A78BFA',
};
const FALLBACK_COLORS = ['#39D353','#D29922','#F85149','#58A6FF','#BC8CFF','#34D399','#F472B6'];

// ─── Agent brand colors ─────────────────────────────────────────────
const AGENT_COLORS = {
  main:   '#FF6B35',
  hermes: '#9B59B6',
  vault:  '#E74C3C',
};

function getAgentColor(id) { return AGENT_COLORS[id] || '#8B949E'; }

// ─── Free model markers ─────────────────────────────────────────────
const FREE_MARKERS = ['free','gemma','qwen','llama','mistral','nvidia','tencent','openchat'];
function isFreeModel(m) { return FREE_MARKERS.some(f => m.toLowerCase().includes(f)); }

// ─── State ─────────────────────────────────────────────────────────
let _data         = null;
let _tickInterval = null;
let _countdown    = REFRESH_SECS;

// ══════════════════════════════════════════════════════════════════
// ─── UTILITIES ───────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════

function esc(str) {
  return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function timeAgo(isoStr) {
  if (!isoStr) return '—';
  const diff = Date.now() - new Date(isoStr).getTime();
  const s = Math.floor(diff / 1000);
  if (s <    60) return `${s}s ago`;
  const m = Math.floor(s / 60);
  if (m <    60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h <    24) return `${h}h ${m % 60}m ago`;
  return `${Math.floor(h / 24)}d ago`;
}

// ─── Human "next run" label ─────────────────────────────────────────
function humanNextRun(isoStr) {
  if (!isoStr) return '—';
  const diff = new Date(isoStr).getTime() - Date.now();
  if (diff <= 0) return 'overdue';

  const totalSecs = Math.floor(diff / 1000);
  const mins      = Math.floor(totalSecs / 60);
  const hrs       = Math.floor(mins / 60);

  if (mins  <  60) return `in ${mins}m`;
  if (hrs   <  24) return `in ${hrs}h ${mins % 60}m`;

  // Further out — show day name or "tomorrow"
  const next     = new Date(isoStr);
  const now      = new Date();
  const diffDays = Math.floor((next - now) / 86_400_000);
  const DAYS     = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const timeStr  = next.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });

  if (diffDays === 0) return `today ${timeStr}`;
  if (diffDays === 1) return `tomorrow ${timeStr}`;
  if (diffDays  <  7) return `${DAYS[next.getDay()]} ${timeStr}`;
  return `${Math.floor(diffDays / 7)}w away`;
}

// ─── Human "last run" label ─────────────────────────────────────────
function humanLastRun(isoStr, lastStatus) {
  if (!isoStr) return '<span class="last-wait">⏳ Never</span>';
  const icon = lastStatus === 'ok'    ? '<span class="last-ok">✅</span>'
             : lastStatus === 'error' ? '<span class="last-fail">❌</span>'
             :                          '<span class="last-wait">⏳</span>';
  return `${icon} ${esc(timeAgo(isoStr))}`;
}

// ─── Cost per run estimate ────────────────────────────────────────
// Pricing per million tokens (input/output) on OpenRouter
const MODEL_PRICING = {
  'claude-opus-4.6':     { input: 5.00,  output: 25.00 },
  'claude-sonnet-4.6':   { input: 3.00,  output: 15.00 },
  'claude-sonnet-4.5':   { input: 3.00,  output: 15.00 },
  'gpt-5.4':             { input: 7.00,  output: 21.00 },
  'gpt-5.4-mini':        { input: 0.40,  output: 1.60  },
  'gpt-5.4-nano':        { input: 0.10,  output: 0.40  },
  'gpt-4.1':             { input: 2.00,  output: 8.00  },
  'gpt-4.1-mini':        { input: 0.40,  output: 1.60  },
  'gemini-2.5-pro':      { input: 1.25,  output: 10.00 },
  'gemini-2.5-flash':    { input: 0.15,  output: 0.60  },
  'free':                { input: 0,     output: 0     },
};
// Avg tokens per cron run (input-heavy because of file reads; small output)
const AVG_INPUT_TOKENS  = 18000;
const AVG_OUTPUT_TOKENS = 3000;

function costPerRun(model) {
  const m = (model || '').toLowerCase();
  if (isFreeModel(m)) return 0;
  let pricing = null;
  if      (m.includes('claude-opus'))       pricing = MODEL_PRICING['claude-opus-4.6'];
  else if (m.includes('claude-sonnet'))     pricing = MODEL_PRICING['claude-sonnet-4.6'];
  else if (m.includes('gpt-5.4-nano'))      pricing = MODEL_PRICING['gpt-5.4-nano'];
  else if (m.includes('gpt-5.4-mini'))      pricing = MODEL_PRICING['gpt-5.4-mini'];
  else if (m.includes('gpt-5.4'))           pricing = MODEL_PRICING['gpt-5.4'];
  else if (m.includes('gpt-4.1-mini'))      pricing = MODEL_PRICING['gpt-4.1-mini'];
  else if (m.includes('gpt-4.1'))           pricing = MODEL_PRICING['gpt-4.1'];
  else if (m.includes('gemini-2.5-pro'))    pricing = MODEL_PRICING['gemini-2.5-pro'];
  else if (m.includes('gemini-2.5-flash'))  pricing = MODEL_PRICING['gemini-2.5-flash'];
  if (!pricing) return null; // unknown paid model
  const cost = (AVG_INPUT_TOKENS / 1_000_000) * pricing.input
             + (AVG_OUTPUT_TOKENS / 1_000_000) * pricing.output;
  return cost;
}

function runsPerDay(scheduleStr, cronExpr) {
  const s = (scheduleStr || '').toLowerCase();
  const c = (cronExpr || '').toLowerCase().trim();
  // Every N minutes
  const minMatch = s.match(/(\d+)\s*min/);
  if (minMatch) return 1440 / parseInt(minMatch[1]);
  // Every N hours
  const hrMatch = s.match(/every\s+(\d+)\s*h/);
  if (hrMatch) return 24 / parseInt(hrMatch[1]);
  // Hourly
  if (s.includes('hour')) return 24;
  // Daily / once per day cron
  if (s.includes('daily') || s.includes('midnight') || /^0 \d+ \* \* \*$/.test(c)) return 1;
  // Weekly
  if (/\b(mon|tue|wed|thu|fri|sat|sun)\b/.test(s) || /^\d+ \d+ \* \* [1-7]$/.test(c) || /^0 \d+ \* \* 0$/.test(c)) return 1/7;
  // One-shot
  if (s.startsWith('once:') || /^\d{4}-\d{2}-\d{2}/.test(c)) return 0;
  return 1; // default daily
}

function costPerRunCell(job) {
  const cpr = costPerRun(job.model);
  const rpd = runsPerDay(job.schedule, job.scheduleCron);
  if (cpr === 0) {
    return `<td class="col-cost cost-free" title="Free model — $0/run">🆓 $0</td>`;
  }
  if (cpr === null) {
    return `<td class="col-cost cost-unknown" title="Unknown pricing">—</td>`;
  }
  const monthly = cpr * rpd * 30;
  const costStr = cpr < 0.001 ? '<$0.001' : '$' + cpr.toFixed(4);
  const moStr   = monthly < 0.01 ? '<$0.01' : '$' + monthly.toFixed(2);
  const cls     = monthly > 5 ? 'cost-high' : monthly > 1 ? 'cost-med' : 'cost-low';
  return `<td class="col-cost ${cls}" title="~${costStr}/run · ~${moStr}/mo">${costStr}<span class="cost-mo"> /mo: ${moStr}</span></td>`;
}

// ─── Short model name with tier badge ──────────────────────────────
function modelShortName(model) {
  const m    = model || 'unknown';
  const free = isFreeModel(m);
  const tier = free
    ? '<span class="model-tier-free" title="Free / OpenRouter">🆓</span>'
    : '<span class="model-tier-paid" title="Paid API">💰</span>';

  const ml   = m.toLowerCase();
  let name;
  if      (ml.includes('claude-opus'))          name = 'Opus 4.6';
  else if (ml.includes('claude-sonnet'))        name = 'Sonnet 4.6';
  else if (ml.includes('gpt-5.4-mini'))         name = 'GPT-5.4-mini';
  else if (ml.includes('gpt-5.4-nano'))         name = 'GPT-5.4-nano';
  else if (ml.includes('gpt-4.1-mini'))         name = 'GPT-4.1-mini';
  else if (ml.includes('gpt-4.1'))              name = 'GPT-4.1';
  else if (ml.includes('gemma'))                name = 'Gemma 4';
  else if (ml.includes('qwen3-coder'))          name = 'Qwen3 Coder';
  else if (ml.includes('qwen'))                 name = 'Qwen';
  else if (ml.includes('gemini-2.5-pro'))       name = 'Gemini 2.5 Pro';
  else if (ml.includes('gemini-2.5-flash'))     name = 'Gemini Flash';
  else if (ml.includes('kimi'))                 name = 'Kimi K2';
  else {
    // Pull the last path segment, strip :free suffix
    name = m.split('/').pop().replace(':free','').replace(/-it$/,'');
    if (name.length > 14) name = name.slice(0, 13) + '…';
  }

  return `<span class="model-cell">${tier}<span class="model-name-text">${esc(name)}</span></span>`;
}

// ─── Row severity class ─────────────────────────────────────────────
function rowClass(job) {
  const n = job.consecutiveErrors || 0;
  if (job.lastStatus === null && n === 0) return 'row-idle';
  if (n >= 3) return 'row-fail';
  if (n >= 1) return 'row-warn';
  return 'row-ok';
}

// ─── Status pill HTML ───────────────────────────────────────────────
function statusPill(job) {
  const n = job.consecutiveErrors || 0;

  if (!job.lastRun)          return `<span class="st-pill st-wait"><span class="st-dot"></span>WAIT</span>`;
  if (n >= 3)                return `<span class="st-pill st-fail"><span class="st-dot"></span>FAIL ×${n}</span>`;
  if (n >= 1)                return `<span class="st-pill st-warn"><span class="st-dot"></span>WARN ×${n}</span>`;
  if (job.lastStatus === 'ok') return `<span class="st-pill st-ok"><span class="st-dot"></span>OK</span>`;
  return `<span class="st-pill st-wait"><span class="st-dot"></span>—</span>`;
}

// ─── Frequency bucket ───────────────────────────────────────────────
function freqGroup(job) {
  const s = (job.schedule || '').toLowerCase();
  const c = (job.scheduleCron || '').toLowerCase();

  // One-shot: runs once at a specific datetime
  if (s.startsWith('once:') || /^\d{4}-\d{2}-\d{2}/.test(c)) return 'oneshot';

  // Weekly patterns: contains day name, or cron has day-of-week field != *
  if (/\b(mon|tue|wed|thu|fri|sat|sun)\b/.test(s)) return 'weekly';
  // cron like "0 10 * * 1" — last field isn't * or ranges
  if (/^\d+\s+\d+\s+\*\s+\*\s+[1-7]$/.test(c.trim())) return 'weekly';
  if (/^0 11 \* \* 0$/.test(c.trim())) return 'weekly';

  // Daily: runs once per day (midnight, 5 AM, 6 AM, 8 AM...)
  if (/daily|midnight/i.test(s)) return 'daily';
  if (/^0 \d+ \* \* \*$/.test(c.trim())) return 'daily';

  // Frequent: everything else (every 30m, hourly, every Xh)
  return 'frequent';
}

// ─── Build one table row ─────────────────────────────────────────────
function buildJobRow(job) {
  const rc       = rowClass(job);
  const isOverdue = humanNextRun(job.nextRun) === 'overdue';
  const errBadge = (job.consecutiveErrors > 0)
    ? `<span class="job-err-badge">${job.consecutiveErrors}×</span>`
    : '';

  return `
    <tr class="${rc}" id="jrow-${esc(job.id)}">
      <td class="col-job">
        <span class="job-name-text">${esc(job.name)}</span>${errBadge}
      </td>
      <td class="col-sched">${esc(job.schedule)}</td>
      <td>${modelShortName(job.model)}</td>
      ${costPerRunCell(job)}
      <td class="col-last">${humanLastRun(job.lastRun, job.lastStatus)}</td>
      <td>${statusPill(job)}</td>
      <td class="col-next${isOverdue ? ' overdue' : ''}" data-next="${esc(job.nextRun || '')}" id="cd-${esc(job.id)}">
        ${humanNextRun(job.nextRun)}
      </td>
    </tr>`;
}

// ─── Build one group block ───────────────────────────────────────────
function buildGroupBlock(icon, title, jobs) {
  const count = jobs.length;
  let body;
  if (count === 0) {
    body = `<div class="job-table-empty">No jobs in this category</div>`;
  } else {
    const rows = jobs.map(buildJobRow).join('');
    body = `
      <div class="table-scroll">
        <table class="job-table">
          <thead>
            <tr>
              <th>Job</th>
              <th>Schedule</th>
              <th>Model</th>
              <th>Est. Cost/Run</th>
              <th>Last Run</th>
              <th>Status</th>
              <th>Next Run</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  return `
    <div class="job-group">
      <div class="job-group-header">
        <span class="job-group-icon">${icon}</span>
        <span class="job-group-title">${title}</span>
        <span class="job-group-badge">${count}</span>
        <span class="job-group-line"></span>
      </div>
      ${body}
    </div>`;
}

// ══════════════════════════════════════════════════════════════════
// ─── EKG MONITOR ─────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════

class EKGMonitor {
  constructor(canvas, color, status) {
    this.canvas    = canvas;
    this.ctx       = canvas.getContext('2d');
    this.color     = color;
    this.status    = status;
    this.points    = [];
    this.phase     = Math.random() * Math.PI * 2;
    this.beatClock = Math.floor(Math.random() * 60);
    this.inBeat    = false;
    this.beatPos   = 0;
    this.logicalW  = 0;
    this.logicalH  = 72;
    this.dpr       = Math.min(window.devicePixelRatio || 1, 2);
    this.initialized = false;
  }

  _setup() {
    const w = this.canvas.offsetWidth;
    if (w <= 0) return false;
    this.logicalW          = w;
    this.canvas.width      = Math.round(w * this.dpr);
    this.canvas.height     = Math.round(this.logicalH * this.dpr);
    this.ctx.setTransform(this.dpr, 0, 0, this.dpr, 0, 0);
    this.points            = new Array(w).fill(this.logicalH / 2);
    this.initialized       = true;
    return true;
  }

  resize() {
    const w = this.canvas.offsetWidth;
    if (w <= 0 || w === this.logicalW) return;
    this.logicalW      = w;
    this.canvas.width  = Math.round(w * this.dpr);
    this.canvas.height = Math.round(this.logicalH * this.dpr);
    this.ctx.setTransform(this.dpr, 0, 0, this.dpr, 0, 0);
    const cy = this.logicalH / 2;
    if (this.points.length > w) {
      this.points = this.points.slice(this.points.length - w);
    } else {
      while (this.points.length < w) this.points.unshift(cy);
    }
  }

  _nextPoint() {
    const H = this.logicalH, cy = H / 2;

    if (this.status === 'error') return cy + (Math.random() - 0.5) * 0.8;

    if (this.status === 'idle') {
      this.phase += 0.02;
      return cy - Math.sin(this.phase) * (H * 0.24);
    }

    const BEAT_INTERVAL = 62;
    this.beatClock++;
    if (!this.inBeat && this.beatClock >= BEAT_INTERVAL) {
      this.inBeat = true; this.beatPos = 0; this.beatClock = 0;
    }

    if (this.inBeat) {
      const bp = this.beatPos++;
      if (bp < 10) return cy - Math.sin(bp / 10 * Math.PI) * (H * 0.10);
      if (bp < 16) return cy;
      if (bp < 19) return cy + H * 0.16;
      if (bp < 24) return cy - H * 0.46 * Math.sin((bp - 19) / 5 * Math.PI);
      if (bp < 28) return cy + H * 0.09 * Math.sin((bp - 24) / 4 * Math.PI);
      if (bp < 36) return cy;
      if (bp < 56) return cy - H * 0.13 * Math.sin((bp - 36) / 20 * Math.PI);
      this.inBeat = false; return cy;
    }
    return cy + (Math.random() - 0.5) * 0.4;
  }

  update() {
    if (!this.initialized) { if (!this._setup()) return; }
    const margin  = 3;
    const pt      = this._nextPoint();
    this.points.push(Math.max(margin, Math.min(this.logicalH - margin, pt)));
    if (this.points.length > this.logicalW) this.points.shift();
  }

  draw() {
    if (!this.initialized || this.points.length < 2) return;
    const { ctx } = this;
    const W = this.logicalW, H = this.logicalH;

    ctx.fillStyle = '#080D11';
    ctx.fillRect(0, 0, W, H);

    // Minor grid
    ctx.beginPath();
    for (let x = 0; x <= W; x += 5) { ctx.moveTo(x, 0); ctx.lineTo(x, H); }
    for (let y = 0; y <= H; y += 5) { ctx.moveTo(0, y); ctx.lineTo(W, y); }
    ctx.strokeStyle = 'rgba(255,255,255,0.025)'; ctx.lineWidth = 0.5; ctx.stroke();

    // Major grid
    ctx.beginPath();
    for (let x = 0; x <= W; x += 20) { ctx.moveTo(x, 0); ctx.lineTo(x, H); }
    for (let y = 0; y <= H; y += 20) { ctx.moveTo(0, y); ctx.lineTo(W, y); }
    ctx.strokeStyle = 'rgba(255,255,255,0.065)'; ctx.lineWidth = 0.5; ctx.stroke();

    // Baseline
    ctx.beginPath(); ctx.moveTo(0, H/2); ctx.lineTo(W, H/2);
    ctx.strokeStyle = 'rgba(255,255,255,0.04)'; ctx.lineWidth = 1; ctx.stroke();

    const lineColor = this.status === 'error' ? '#F85149' : this.color;
    const len = this.points.length;
    const t1  = Math.floor(len * 0.35);
    const t2  = Math.floor(len * 0.68);

    ctx.lineJoin = 'round'; ctx.lineCap = 'round';

    ctx.globalAlpha = 0.12; ctx.strokeStyle = lineColor; ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.moveTo(0, this.points[0]);
    for (let i = 1; i < t1; i++) ctx.lineTo(i, this.points[i]);
    ctx.stroke();

    ctx.globalAlpha = 0.42; ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.moveTo(t1, this.points[t1]);
    for (let i = t1 + 1; i < t2; i++) ctx.lineTo(i, this.points[i]);
    ctx.stroke();

    ctx.globalAlpha = 0.95; ctx.lineWidth = 1.6;
    ctx.shadowColor = lineColor; ctx.shadowBlur = this.status === 'active' ? 6 : 4;
    ctx.beginPath(); ctx.moveTo(t2, this.points[t2]);
    for (let i = t2 + 1; i < len; i++) ctx.lineTo(i, this.points[i]);
    ctx.stroke(); ctx.shadowBlur = 0;

    if (this.status === 'error') {
      ctx.globalAlpha = 0.08; ctx.fillStyle = '#F85149';
      ctx.fillRect(0, H/2 - 4, W, 8);
    }
    ctx.globalAlpha = 1;

    ctx.shadowColor = lineColor; ctx.shadowBlur = 14;
    ctx.fillStyle = lineColor;
    ctx.beginPath(); ctx.arc(len - 1, this.points[len - 1], 2.8, 0, Math.PI * 2);
    ctx.fill(); ctx.shadowBlur = 0;
  }
}

// ─── EKG Animation loop ────────────────────────────────────────────
let _ekgMonitors = {};
let _rafId       = null;

function _ekgLoop() {
  for (const m of Object.values(_ekgMonitors)) { m.resize(); m.update(); m.draw(); }
  _rafId = requestAnimationFrame(_ekgLoop);
}

function startEKGLoop() {
  if (_rafId) cancelAnimationFrame(_rafId);
  _rafId = requestAnimationFrame(_ekgLoop);
}

function stopEKGLoop() {
  if (_rafId) { cancelAnimationFrame(_rafId); _rafId = null; }
  _ekgMonitors = {};
}

// ─── Sub-agent duration formatter ──────────────────────────────────
function fmtDuration(secs) {
  if (!secs) return '—';
  if (secs <    60) return `${secs}s`;
  const m = Math.floor(secs / 60);
  if (m   <    60) return `${m}m ${secs % 60}s`;
  const h = Math.floor(m / 60);
  return `${h}h ${m % 60}m`;
}

// ─── Toggle sub-agent dropdown ─────────────────────────────────────
function toggleSubagents(agentId) {
  const drop  = document.getElementById(`sa-drop-${agentId}`);
  const arrow = document.getElementById(`sa-arrow-${agentId}`);
  if (!drop) return;
  const open = drop.classList.toggle('open');
  if (arrow) arrow.classList.toggle('open', open);
}

// ─── RENDER: Agents ───────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════

function renderAgents(agents) {
  const el = document.getElementById('agents-row');
  document.getElementById('agent-count').textContent = agents.length;
  stopEKGLoop();

  el.innerHTML = agents.map(a => {
    const color = getAgentColor(a.id);
    const sc    = a.status;

    // Status badge
    let badge;
    if      (sc === 'active')                  badge = `<span class="status-badge active"><span class="pulse-dot"></span>Active</span>`;
    else if (sc === 'online')                  badge = `<span class="status-badge online">🔵 Online</span>`;
    else if (sc === 'offline')                 badge = `<span class="status-badge offline">🔴 Offline</span>`;
    else if (sc === 'idle')                    badge = `<span class="status-badge idle">⚪ Idle</span>`;
    else if (sc === 'queued')                  badge = `<span class="status-badge queued">🟡 Queued</span>`;
    else if (sc === 'error' || sc === 'failed') badge = `<span class="status-badge failed">🔴 Error</span>`;
    else                                       badge = `<span class="status-badge idle">⚪ ${esc(sc)}</span>`;

    const taskText  = a.currentTask || 'No active task';
    const taskClass = a.currentTask ? '' : 'empty';
    const elapsed   = a.elapsedMinutes
      ? `<div class="agent-meta-item">⏱ <strong>${a.elapsedMinutes}m</strong> elapsed</div>`
      : '';

    // Sub-agent dropdown
    const subagents  = a.subagents || [];
    const saCount    = subagents.length;
    const running    = subagents.filter(s => s.status === 'running').length;
    const countLabel = running > 0 ? `${running} running` : saCount > 0 ? `${saCount} recent` : '0';

    let saRows;
    if (saCount === 0) {
      saRows = `<div class="sa-empty">No active tasks</div>`;
    } else {
      saRows = subagents.map(sa => {
        const isRunning = sa.status === 'running';
        const dotCls    = isRunning ? 'sa-dot sa-pulse' : 'sa-dot';
        const rowCls    = isRunning ? 'sa-row' : 'sa-row sa-done';
        const statusLbl = isRunning
          ? `<span class="sa-status-running">● running</span>`
          : `<span class="sa-status-completed">✓ done</span>`;
        return `
          <div class="${rowCls}">
            <span class="${dotCls}" style="background:${color}"></span>
            <div class="sa-body">
              <span class="sa-task">${esc(sa.task)}</span>
              <span class="sa-meta">${esc(sa.model.split('/').pop())} · ${fmtDuration(sa.durationSeconds)} · ${statusLbl}</span>
            </div>
          </div>`;
      }).join('');
    }

    return `
      <div class="agent-card ${sc}" style="border-top-color:${color};">
        <div class="agent-header">
          <span class="agent-name">${esc(a.name)}</span>
          ${badge}
        </div>
        <div class="ekg-canvas-wrap">
          <canvas class="ekg-canvas" id="ekg-${esc(a.id)}"></canvas>
        </div>
        <div class="agent-task ${taskClass}" title="${esc(taskText)}">${esc(taskText)}</div>
        <div class="agent-meta">
          <div class="agent-meta-item">🤖 <strong>${esc(a.model)}</strong></div>
          ${elapsed}
        </div>
        <div class="sa-toggle" onclick="toggleSubagents('${esc(a.id)}')">
          <span class="sa-toggle-label">Sub-agents</span>
          <span class="sa-toggle-count">${esc(countLabel)}</span>
          <span class="sa-toggle-arrow" id="sa-arrow-${esc(a.id)}">▼</span>
        </div>
        <div class="sa-dropdown" id="sa-drop-${esc(a.id)}">
          <div class="sa-list">${saRows}</div>
        </div>
      </div>`;
  }).join('');

  // Init EKG after DOM is ready
  requestAnimationFrame(() => requestAnimationFrame(() => {
    agents.forEach(a => {
      const canvas = document.getElementById(`ekg-${a.id}`);
      if (!canvas) return;
      let mode = a.status;
      if (mode === 'failed' || mode === 'error') mode = 'error';
      else if (mode !== 'active')                mode = 'idle';
      _ekgMonitors[a.id] = new EKGMonitor(canvas, getAgentColor(a.id), mode);
    });
    startEKGLoop();
  }));
}

// ─── RENDER: Jobs (grouped tables) ───────────────────────────────
// ══════════════════════════════════════════════════════════════════

function renderJobs(jobs) {
  document.getElementById('jobs-count').textContent = jobs.length;

  const groups = { frequent: [], daily: [], weekly: [], oneshot: [] };
  jobs.forEach(j => groups[freqGroup(j)].push(j));

  // Sort each group: failing first, then alphabetical
  const sortGroup = arr => arr.sort((a, b) => {
    const ae = a.consecutiveErrors || 0, be = b.consecutiveErrors || 0;
    if (ae !== be) return be - ae;
    return (a.name || '').localeCompare(b.name || '');
  });

  for (const k of Object.keys(groups)) sortGroup(groups[k]);

  const html =
    buildGroupBlock('⚡', 'FREQUENT  —  every 30 min – 3 h',  groups.frequent) +
    buildGroupBlock('📅', 'DAILY  —  once per day',            groups.daily)    +
    buildGroupBlock('📆', 'WEEKLY  —  once per week',          groups.weekly)   +
    buildGroupBlock('🎯', 'ONE-SHOT  —  runs once then done',  groups.oneshot);

  document.getElementById('job-groups').innerHTML = html;
}

// ─── RENDER: Pie Chart ───────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════

function renderPieChart(modelUsage) {
  const canvas  = document.getElementById('pie-canvas');
  const ctx     = canvas.getContext('2d');
  const entries = Object.entries(modelUsage.last7days || {});
  const total   = entries.reduce((s, [, v]) => s + (v.cost || 0), 0);

  const W = canvas.width, H = canvas.height;
  const cx = W / 2, cy = H / 2;
  const outerR = Math.min(cx, cy) - 8;
  const innerR = outerR * 0.52;

  ctx.clearRect(0, 0, W, H);

  if (total === 0) {
    ctx.fillStyle = '#30363D';
    ctx.beginPath(); ctx.arc(cx, cy, outerR, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx, cy, innerR, 0, Math.PI * 2);
    ctx.fillStyle = '#161B22'; ctx.fill();
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#8B949E'; ctx.font = '11px system-ui';
    ctx.fillText('No data yet', cx, cy);
    document.getElementById('model-legend').innerHTML = '';
    document.getElementById('savings-num').textContent  = '$0.00/mo';
    document.getElementById('savings-desc').textContent = 'No spend in last 7 days';
    document.getElementById('cost-7d').textContent      = '$0.00';
    document.getElementById('cost-monthly').textContent = '$0.00';
    return;
  }

  let angle     = -Math.PI / 2;
  const colorMap = {};

  entries.forEach(([model, usage], i) => {
    const slice = ((usage.cost || 0) / total) * Math.PI * 2;
    const color = MODEL_COLORS[model] || FALLBACK_COLORS[i % FALLBACK_COLORS.length];
    colorMap[model] = color;

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, outerR, angle, angle + slice);
    ctx.closePath();
    ctx.fillStyle   = color;
    ctx.fill();
    ctx.strokeStyle = '#161B22';
    ctx.lineWidth   = 2;
    ctx.stroke();
    angle += slice;
  });

  // Donut hole
  ctx.beginPath(); ctx.arc(cx, cy, innerR, 0, Math.PI * 2);
  ctx.fillStyle = '#161B22'; ctx.fill();

  // Center label
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#E6EDF3'; ctx.font = 'bold 17px system-ui';
  ctx.fillText(`$${total.toFixed(2)}`, cx, cy - 9);
  ctx.font = '10px system-ui'; ctx.fillStyle = '#8B949E';
  ctx.fillText('7-day spend', cx, cy + 9);

  // Legend
  document.getElementById('model-legend').innerHTML = entries.map(([model, usage], i) => {
    const color = colorMap[model] || FALLBACK_COLORS[i % FALLBACK_COLORS.length];
    const pct   = total > 0 ? ((usage.cost / total) * 100).toFixed(0) : '0';
    const name  = model.split('/').pop().replace(':free', '');
    return `
      <div class="legend-row">
        <span class="legend-swatch" style="background:${color}"></span>
        <span class="legend-model" title="${esc(model)}">${esc(name)}</span>
        <span class="legend-pct">${pct}%</span>
        <span class="legend-cost">$${(usage.cost || 0).toFixed(2)}</span>
      </div>`;
  }).join('');

  const savings = modelUsage.potentialSavings || {};
  document.getElementById('savings-num').textContent  = `$${(savings.ifFreeModelsUsed || 0).toFixed(2)}/mo`;
  document.getElementById('savings-desc').textContent = savings.description || '—';
  document.getElementById('cost-7d').textContent      = `$${(modelUsage.totalCost7days || 0).toFixed(2)}`;
  document.getElementById('cost-monthly').textContent = `$${(modelUsage.projectedMonthlyCost || 0).toFixed(2)}`;
}

// ─── RENDER: Alerts ──────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════

function renderAlerts(alerts) {
  const dismissed = JSON.parse(localStorage.getItem('dismissedAlerts') || '[]');
  const el        = document.getElementById('alert-list');
  const sorted    = [...alerts].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
  const active    = sorted.filter(a => !dismissed.includes(a.id));

  document.getElementById('alert-count').textContent = active.length;

  if (sorted.length === 0) {
    el.innerHTML = `<div class="no-alerts">No alerts ✓</div>`;
    return;
  }

  el.innerHTML = sorted.map(alert => {
    const isDismissed = dismissed.includes(alert.id);
    return `
      <div class="alert-item ${isDismissed ? 'dismissed' : ''}" id="alrt-${esc(alert.id)}">
        <span class="alert-sev ${esc(alert.severity)}">${esc(alert.severity)}</span>
        <div class="alert-body">
          <div class="alert-job">${esc(alert.job)}</div>
          <div class="alert-msg">${esc(alert.message)}</div>
          <div class="alert-time">${timeAgo(alert.timestamp)}</div>
        </div>
        <button class="btn-dismiss" onclick="dismissAlert('${esc(alert.id)}')" title="Dismiss">✕</button>
      </div>`;
  }).join('');

  if (active.length === 0) {
    el.insertAdjacentHTML('beforeend', `<div class="no-alerts">All alerts dismissed ✓</div>`);
  }
}

function dismissAlert(id) {
  const dismissed = JSON.parse(localStorage.getItem('dismissedAlerts') || '[]');
  if (!dismissed.includes(id)) dismissed.push(id);
  localStorage.setItem('dismissedAlerts', JSON.stringify(dismissed));
  const el = document.getElementById(`alrt-${id}`);
  if (el) el.classList.add('dismissed');
  if (_data) renderAlerts(_data.alerts);
}

// ─── TICK (countdown + live-update next-run cells) ────────────────
// ══════════════════════════════════════════════════════════════════

function tick() {
  _countdown--;
  const cdEl = document.getElementById('countdown-secs');
  if (cdEl) cdEl.textContent = Math.max(0, _countdown);
  if (_countdown <= 0) { _countdown = REFRESH_SECS; loadData(); }

  // Refresh all "next run" countdown cells in place (no full re-render)
  document.querySelectorAll('[data-next]').forEach(el => {
    const iso = el.dataset.next;
    if (!iso) return;
    const val = humanNextRun(iso);
    el.textContent = val;
    if (val === 'overdue') el.classList.add('overdue');
    else                   el.classList.remove('overdue');
  });
}

// ─── LOAD DATA ───────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════

async function loadData() {
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true;
  btn.innerHTML = `<span class="spinner"></span> Loading`;

  try {
    const res = await fetch(`${DATA_URL}?_=${Date.now()}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    _data = await res.json();

    renderAgents(_data.agents  || []);
    renderJobs(_data.jobs      || []);
    renderPieChart(_data.modelUsage || { last7days: {}, totalCost7days: 0, projectedMonthlyCost: 0, potentialSavings: {} });
    renderAlerts(_data.alerts  || []);
    renderProjects(_data.projectHealth || {});
    renderAICosts();

    document.getElementById('updated-at').textContent = timeAgo(_data.generatedAt);
  } catch (err) {
    console.error('Data load error:', err);
    document.getElementById('updated-at').textContent = '⚠️ Load failed';
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<span>⟳</span> Refresh`;
    _countdown = REFRESH_SECS;
  }
}

function triggerRefresh() { _countdown = REFRESH_SECS; loadData(); }

const COST_DATA_URL = 'data/cost-data.json';

async function renderAICosts() {
  const panel = document.getElementById('ai-costs-panel');
  if (!panel) return;

  try {
    const res = await fetch(`${COST_DATA_URL}?_=${Date.now()}`);
    let costInfo = {};
    if (res.ok) {
      costInfo = await res.json();
    }

    const s = costInfo.summary || {};
    const daily   = parseFloat(s.usage_daily   || 0);
    const weekly  = parseFloat(s.usage_weekly  || 0);
    const monthly = parseFloat(s.usage_monthly || 0);
    const projected = daily * 30;
    const updated = costInfo.updated ? new Date(costInfo.updated).toLocaleString() : '—';

    // Color thresholds
    const dailyColor = daily > 30 ? 'cost-red' : daily > 15 ? 'cost-yellow' : 'cost-green';
    const monthlyColor = monthly > 500 ? 'cost-red' : monthly > 200 ? 'cost-yellow' : 'cost-green';
    const projColor = projected > 600 ? 'cost-red' : projected > 300 ? 'cost-yellow' : 'cost-green';

    // Build 7-day bar chart from daily breakdown if available
    const dailyBreakdown = costInfo.daily_breakdown || {};
    const last7 = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date(Date.now() - i * 86400000);
      const key = d.toISOString().slice(0, 10);
      const label = d.toLocaleDateString('en-US', { weekday: 'short' });
      last7.push({ key, label, cost: dailyBreakdown[key] || (i === 0 ? daily : 0) });
    }
    const maxBar = Math.max(...last7.map(d => d.cost), 0.01);

    panel.innerHTML = `
      <!-- Summary Cards -->
      <div class="cost-cards">
        <div class="cost-card">
          <div class="cost-card-label">Today</div>
          <div class="cost-card-value ${dailyColor}">$${daily.toFixed(2)}</div>
          <div class="cost-card-sub">≈ $${(daily * 7).toFixed(0)}/week at this rate</div>

        <div class="cost-card">
          <div class="cost-card-label">This Week</div>
          <div class="cost-card-value">$${weekly.toFixed(2)}</div>
          <div class="cost-card-sub">${weekly > 0 ? 'Avg $' + (weekly/7).toFixed(2) + '/day' : 'Rolling 7 days'}</div>
        </div>
        <div class="cost-card">
          <div class="cost-card-label">This Month</div>
          <div class="cost-card-value ${monthlyColor}">$${monthly.toFixed(2)}</div>
          <div class="cost-card-sub">All-time OpenRouter spend</div>
        </div>
        <div class="cost-card">
          <div class="cost-card-label">Projected /mo</div>
          <div class="cost-card-value ${projColor}">$${projected.toFixed(0)}</div>
          <div class="cost-card-sub">At today\'s daily rate</div>
        </div>
      </div>

      <!-- 7-Day Spend Chart -->
      <div style="background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:16px">
        <div style="font-size:12px;font-weight:700;margin-bottom:10px;color:var(--text)">7-Day Spend</div>
        <div class="cost-bar-chart">
          ${last7.map(d => `
            <div class="cost-bar-col">
              <div class="cost-bar-val">${d.cost > 0 ? '$' + d.cost.toFixed(0) : ''}</div>
              <div class="cost-bar" style="height:${Math.max(2, (d.cost / maxBar) * 60)}px;${d.key === new Date().toISOString().slice(0,10) ? 'background:var(--accent)' : 'background:var(--blue)'}"></div>
              <div class="cost-bar-label">${d.label}</div>
            </div>
          `).join('')}
        </div>
      </div>

      <!-- Model Strategy -->
      <div style="font-size:12px;font-weight:700;margin-bottom:8px;color:var(--text)">🧠 Model Strategy</div>
      <div class="cost-strategy">

        <div class="cost-strat-card">

    `;
  } catch (err) {
    panel.innerHTML = `<div style="color:var(--red);padding:16px">Error loading cost data: ${err.message}</div>`;

}
